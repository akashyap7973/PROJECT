<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Manager – Notes</title>

  
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/notes.css">
    <script src="js/global.js" defer></script>
    <script src="js/notes.js" defer></script>
</head>

<body>

    
    <nav class="navbar">
        <div class="logo">Daily Manager</div>
        <ul class="nav-links">
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="habits.html">Habits</a></li>
            <li><a href="planner.html">Planner</a></li>
            <li><a href="notes.html" class="active">Notes</a></li>
            <li><a href="progress.html">Progress</a></li>
            <li><a href="profile.html">Profile</a></li>
        </ul>
    </nav>
    
    <!-- Main Content -->
    <main class="main">

        <!-- Heading Section -->
        <section class="hero">
            <h1 class="page-title">Quick Notes</h1>
            <p class="page-subtitle">
                Jot down your thoughts, ideas, or reminders.
            </p>
        </section>

        <!-- Note Input Section -->
        <section class="note-card">
            <div class="note-row">
                <textarea 
                    class="note-input" 
                    placeholder="Write your note here..."
                ></textarea>
                <button class="btn-save">Save Note</button>
            </div>
        </section>

        <!-- Notes List Section -->
        <section class="notes-container">
            <ul class="notes-list"></ul>
        </section>

    </main>

</body>
</html>
