<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Life Manager - Habits</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/habit.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Daily Manager</div>
        <ul class="nav-links">
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="habits.html">Habits</a></li>
            <li><a href="planner.html">Planner</a></li>
            <li><a href="notes.html">Notes</a></li>
            <li><a href="progress.html">Progress</a></li>
            <li><a href="profile.html">Profile</a></li>
        </ul>
    </nav>

     <main class="container fade-in">
        <header class="page-header">
            <h1>Daily Habits</h1>
            <p>Track your daily routines to build better habits.</p>
        </header>
        
        <div class="card">
            <div class="input-group">
                <input type="text" id="habit-input" placeholder="Enter a new habit (e.g., Drink water)">
                <button id="add-habit-btn">Add Habit</button>
            </div>
            
            <ul class="item-list" id="habits-list">
                
            </ul>
        </div>
    </main>
    <div class="weekly-tracker">
  <h2>Weekly Tracker</h2>

  <table>
    <thead>
      <tr>
        <th>Habit</th>
        <th>Mon</th>
        <th>Tue</th>
        <th>Wed</th>
        <th>Thu</th>
        <th>Fri</th>
        <th>Sat</th>
        <th>Sun</th>
        <th>%</th> 
      </tr>
    </thead>

    <tbody>
      <tr>
        <td>Drink Water</td>

        <td><input type="checkbox" class="day"></td>
        <td><input type="checkbox" class="day"></td>
        <td><input type="checkbox" class="day"></td>
        <td><input type="checkbox" class="day"></td>
        <td><input type="checkbox" class="day"></td>
        <td><input type="checkbox" class="day"></td>
        <td><input type="checkbox" class="day"></td>

        <td class="percentage">0%</td> 
      </tr>

      <tr>
        <td>Exercise</td>

        <td><input type="checkbox" class="day"></td>
        <td><input type="checkbox" class="day"></td>
        <td><input type="checkbox" class="day"></td>
        <td><input type="checkbox" class="day"></td>
        <td><input type="checkbox" class="day"></td>
        <td><input type="checkbox" class="day"></td>
        <td><input type="checkbox" class="day"></td>

        <td class="percentage">0%</td>
      </tr>
    </tbody>
  </table>
</div>

    <script src="js/global.js"></script>
    <script src="js/habit.js"></script>
</body>
</html>
